name: 'Build: fluyo-cm2labs v2'
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
      - name: Prep UI
        shell: bash
        run: |
          if [ ! -f ui/index.html ]; then
            echo "ERROR: ui/index.html not found!"
            exit 1
          fi
          echo "ui/index.html ready ($(wc -c < ui/index.html) bytes)"
      - name: Install dependencies
        run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: fluyo-v2.0.${{ github.run_number }}
          releaseName: "Fluyo Desktop v2.0.${{ github.run_number }}"
          releaseDraft: true
      - name: Upload Standalone Executable
        uses: actions/upload-artifact@v4
        with:
          name: standalone-executable
          path: |
            src-tauri/target/release/fluyo-cm2labs.exe
            src-tauri/target/release/*.exe
          if-no-files-found: error
      - name: Upload Installer Setup
        uses: actions/upload-artifact@v4
        with:
          name: installer-setup
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error