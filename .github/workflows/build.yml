name: 'Build: cm2labs Multi-Platform'
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_windows:
        description: 'Build for Windows (.exe + NSIS)'
        type: boolean
        default: true
      build_linux:
        description: 'Build for Linux (.deb / AppImage)'
        type: boolean
        default: true
      build_android:
        description: 'Build for Android (.apk)'
        type: boolean
        default: false

permissions:
  contents: write

# ─── TOGGLES DE PLATAFORMA ─────────────────────────────
# En push:            Windows ✅  Linux ✅  Android ❌
# En workflow_dispatch: respeta los inputs del UI
# Para cambiar push defaults: editá los 'true'|'false'
# en el if de cada job abajo.
# ───────────────────────────────────────────────────────

jobs:
  # ======================== WINDOWS ========================
  build-windows:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_windows == 'true') }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
      - name: Prep UI
        shell: bash
        run: |
          if [ ! -f ui/index.html ]; then
            echo "ERROR: ui/index.html not found!"
            exit 1
          fi
          echo "ui/index.html ready ($(wc -c < ui/index.html) bytes)"
      - name: Install deps
        run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v0.1.${{ github.run_number }}
          releaseName: "cm2labs v0.1.${{ github.run_number }}"
          releaseDraft: true
      - name: Upload Standalone EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone
          path: src-tauri/target/release/*.exe
          if-no-files-found: error
      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ======================== LINUX ==========================
  build-linux:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.build_linux == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: Prep UI
        run: |
          if [ ! -f ui/index.html ]; then
            echo "ERROR: ui/index.html not found!"
            exit 1
          fi
          echo "ui/index.html ready ($(wc -c < ui/index.html) bytes)"
      - name: Install deps
        run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v0.1.${{ github.run_number }}
          releaseName: "cm2labs v0.1.${{ github.run_number }}"
          releaseDraft: true
      - name: Upload .deb / AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  # ======================= ANDROID ========================
  build-android:
    # Solo con workflow_dispatch (Android requiere SDK pesado)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
          rustup target add i686-linux-android
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl wget file \
            libssl-dev \
            libwebkit2gtk-4.1-dev
      - name: Prep UI
        run: |
          if [ ! -f ui/index.html ]; then
            echo "ERROR: ui/index.html not found!"
            exit 1
          fi
          echo "ui/index.html ready ($(wc -c < ui/index.html) bytes)"
      - name: Install deps
        run: npm install
      - name: Init Android project
        run: npm run tauri android init
      - name: Build Android APK
        run: npm run tauri android build -- --apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/*/*.apk
          if-no-files-found: error